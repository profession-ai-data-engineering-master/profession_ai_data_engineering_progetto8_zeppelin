name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Spark gira sulla JVM: serve un JDK nel runner (allineato a quello locale).
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy

      # I test usano una SparkSession locale sul sample versionato (600 righe),
      # mai sul dataset completo. Su Linux non serve winutils/HADOOP_HOME.
      - name: Test (pytest + coverage)
        run: pytest
